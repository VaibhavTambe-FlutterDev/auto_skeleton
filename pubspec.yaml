name: auto_skeleton
description: >
  Auto-generate skeleton/shimmer loading screens from your actual widget tree.
  Zero fake data needed — just wrap your widget and get a matching placeholder shape automatically.
version: 0.1.1
homepage: https://github.com/VaibhavTambe-FlutterDev/auto_skeleton
repository: https://github.com/VaibhavTambe-FlutterDev/auto_skeleton
issue_tracker: https://github.com/VaibhavTambe-FlutterDev/auto_skeleton/issues
topics:
  - skeleton
  - shimmer
  - loading
  - placeholder
  - ui

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
